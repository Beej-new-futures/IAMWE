<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUDIO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #canvas-wrapper {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    #logo img {
      width: clamp(280px, 36vw, 640px);
      height: auto;
      display: block;
      filter: invert(1);
    }

    #scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(0,0,0,0.3);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fade-hint 3s ease-in-out infinite;
    }

    @keyframes fade-hint {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    .nav-item {
      position: fixed;
      top: 1.5rem;
      z-index: 100;
      display: block;
      width: 48px;
      height: 48px;
      text-decoration: none;
      cursor: pointer;
      mix-blend-mode: difference;
    }

    .nav-item.left  { left: 1.5rem; }
    .nav-item.right { right: 1.5rem; }

    .nav-item img,
    .nav-item span {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.35s ease;
    }

    .nav-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 1;
      filter: invert(1);
    }

    .nav-item span {
      opacity: 0;
      color: #ff6600;
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: bold;
      white-space: nowrap;
    }

    .nav-item:hover span { opacity: 1; }
  </style>
</head>
<body>

  <div id="canvas-wrapper">
    <canvas id="three-canvas"></canvas>
  </div>

  <div id="logo">
    <img src="/IAMWE_LOGO_.svg" alt="IAMWE">
  </div>

  <a href="#" class="nav-item left">
    <img src="/nav_symbol_01.png" alt="Work">
    <span>Work</span>
  </a>
  <a href="#" class="nav-item right">
    <img src="/nav_symbol_02.png" alt="About">
    <span>About</span>
  </a>

  <div id="scroll-hint">Scroll</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
